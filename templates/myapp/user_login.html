{% extends 'myapp/base.html' %}
{% load static %}

{% block title %}User Login - HybridCloud{% endblock %}

{% block body %}
<style>
    .user-login-container {
        min-height: calc(100vh - 150px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 0;
    }
    
    .login-card {
        background: rgba(10, 15, 31, 0.9);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(147, 51, 234, 0.3);
        border-radius: 16px;
        width: 100%;
        max-width: 420px;
        margin: 0 auto;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        overflow: hidden;
    }
    
    .login-header {
        background: linear-gradient(135deg, rgba(147, 51, 234, 0.2), rgba(236, 72, 153, 0.2));
        padding: 2rem 2rem 1.5rem 2rem;
        text-align: center;
        border-bottom: 1px solid rgba(147, 51, 234, 0.3);
    }
    
    .login-header img {
        width: 80px;
        height: 80px;
        margin-bottom: 1rem;
        filter: drop-shadow(0 0 20px rgba(147, 51, 234, 0.5));
    }
    
    .login-header h1 {
        font-size: 2rem;
        font-weight: 600;
        background: linear-gradient(135deg, #9333ea, #ec4899);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin: 0;
    }
    
    .login-header p {
        color: rgba(255, 255, 255, 0.6);
        font-size: 0.9rem;
        margin-top: 0.5rem;
    }
    
    .login-body {
        padding: 2rem;
    }
    
    .form-group {
        margin-bottom: 1.5rem;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: #9333ea;
        font-weight: 500;
        font-size: 0.9rem;
    }
    
    .form-control {
        width: 100%;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(147, 51, 234, 0.3);
        border-radius: 8px;
        padding: 12px 15px;
        color: white;
        font-size: 0.95rem;
        transition: all 0.3s ease;
    }
    
    .form-control:focus {
        outline: none;
        border-color: #9333ea;
        box-shadow: 0 0 0 3px rgba(147, 51, 234, 0.2);
    }
    
    .form-control::placeholder {
        color: rgba(255, 255, 255, 0.3);
    }
    
    .btn-login {
        width: 100%;
        background: linear-gradient(135deg, #9333ea, #ec4899);
        color: white;
        border: none;
        border-radius: 8px;
        padding: 12px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: opacity 0.3s ease;
        margin-bottom: 0.75rem;
    }
    
    .btn-login:hover {
        opacity: 0.9;
    }
    
    .btn-reset {
        width: 100%;
        background: transparent;
        color: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(147, 51, 234, 0.3);
        border-radius: 8px;
        padding: 12px;
        font-weight: 500;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .btn-reset:hover {
        border-color: #9333ea;
        color: white;
    }
    
    .btn-new-user {
        width: 100%;
        background: transparent;
        color: #9333ea;
        border: 2px solid #9333ea;
        border-radius: 8px;
        padding: 12px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        display: inline-block;
        text-decoration: none;
        text-align: center;
    }
    
    .btn-new-user:hover {
        background: rgba(147, 51, 234, 0.1);
        color: #ec4899;
        border-color: #ec4899;
        text-decoration: none;
    }
    
    .error-message {
        background: rgba(220, 53, 69, 0.1);
        border: 1px solid #dc3545;
        border-radius: 8px;
        padding: 0.75rem;
        margin-bottom: 1.5rem;
        color: #dc3545;
        text-align: center;
        font-size: 0.9rem;
    }
    
    .success-message {
        background: rgba(40, 167, 69, 0.1);
        border: 1px solid #28a745;
        border-radius: 8px;
        padding: 0.75rem;
        margin-bottom: 1.5rem;
        color: #28a745;
        text-align: center;
        font-size: 0.9rem;
    }
    
    .info-message {
        color: rgba(255, 255, 255, 0.6);
        text-align: center;
        font-size: 0.9rem;
        margin-top: 1rem;
    }
    
    .back-link {
        text-align: center;
        margin-top: 1.5rem;
    }
    
    .back-link a {
        color: rgba(255, 255, 255, 0.5);
        text-decoration: none;
        font-size: 0.9rem;
        transition: color 0.3s ease;
    }
    
    .back-link a:hover {
        color: #9333ea;
    }
    
    .back-link i {
        margin-right: 0.3rem;
    }
    
    .divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 1.5rem 0;
        color: rgba(255, 255, 255, 0.3);
    }
    
    .divider::before,
    .divider::after {
        content: '';
        flex: 1;
        border-bottom: 1px solid rgba(147, 51, 234, 0.2);
    }
    
    .divider span {
        padding: 0 10px;
        font-size: 0.8rem;
    }
</style>

<div class="container">
    <div class="user-login-container">
        <div class="row justify-content-center w-100">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
                <div class="login-card">
                    <!-- Header with Image -->
                    <div class="login-header">
                        <img src="{% static 'myapp/images/person.png' %}" alt="User Login">
                        <h1>User Login</h1>
                        <p>Access your personal storage space</p>
                    </div>
                    
                    <!-- Login Form -->
                    <div class="login-body">
                        <!-- Display Messages -->
                        {% if msg %}
                            <div class="error-message">
                                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                                {{ msg }}
                            </div>
                        {% endif %}
                        
                        <form method="post" action="{% url 'user_login' %}"autocomplete="off">
                            {% csrf_token %}
                            
                            <div class="form-group">
                                <label for="uname">
                                    <i class="bi bi-person-fill me-1"></i>Username
                                </label>
                                <input type="text" 
                                       class="form-control" 
                                       name="uname" 
                                       id="uname" 
                                       placeholder="Enter your username"
                                       required
                                       autocomplete="off">
                            </div>
                            
                            <div class="form-group">
                                <label for="passwd">
                                    <i class="bi bi-lock-fill me-1"></i>Password
                                </label>
                                <input type="password" 
                                       class="form-control" 
                                       name="passwd" 
                                       id="passwd" 
                                       placeholder="Enter your password"
                                       required
                                       autocomplete="off">
                            </div>
                            
                            <button type="submit" class="btn-login" id="bt" name="bt">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Login
                            </button>
                            
                            <button type="reset" class="btn-reset" id="rt" name="rt">
                                <i class="bi bi-arrow-counterclockwise me-2"></i>Reset
                            </button>
                        </form>
                        
                        <!-- Divider -->
                        <div class="divider">
                            <span>NEW USER?</span>
                        </div>
                        
                        <!-- New User Button -->
                        <a href="{% url 'user_details_add' %}" class="btn-new-user" role="button">
                            <i class="bi bi-person-plus-fill me-2"></i>Create New Account
                        </a>
                        
                        <!-- Back to Home Link -->
                        <div class="back-link">
                            <a href="{% url 'index' %}">
                                <i class="bi bi-arrow-left"></i>
                                Back to Home
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Optional: Add loading spinner on form submission -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.querySelector('form');
    const submitBtn = document.getElementById('bt');
    
    if (form) {
        form.addEventListener('submit', function() {
            submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Logging in...';
            submitBtn.disabled = true;
        });
    }
});
</script>
{% endblock %}
