{% extends 'myapp/base.html' %}
{% load static %}

{% block title %}Share Link Expired{% endblock %}

{% block body %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card text-center">
                <div class="card-header bg-danger text-white">
                    <h4><i class="bi bi-exclamation-triangle-fill me-2"></i>Link Expired</h4>
                </div>
                <div class="card-body">
                    <i class="bi bi-clock-history" style="font-size: 4rem; color: #dc3545;"></i>
                    <h5 class="mt-3">{{ message }}</h5>
                    <p class="text-muted">This share link is no longer active.</p>
                    <a href="{% url 'index' %}" class="btn btn-primary">
                        <i class="bi bi-house me-2"></i>Go to Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
